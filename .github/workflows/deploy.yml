name: CI/CD Backend Despacho

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Login a Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest ./Springboot-API-REST-DESPACHO

      - name: Publicar imagen en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest

      - name: Desplegar en EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest
            docker stop backend-despacho || true
            docker rm backend-despacho || true
            docker run -d --name backend-despacho -p 8081:8081 \
              -e DB_ENDPOINT=localhost \
              -e DB_PORT=3306 \
              -e DB_NAME=db_despacho \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=root1234 \
              ${{ secrets.DOCKER_USERNAME }}/backend-despacho:latest
